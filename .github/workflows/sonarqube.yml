name: SonarQube analysis

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  analysis:
    name: Analyze
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test with coverage
        run: npm run test:coverage

      - name: Check SonarQube configuration
        id: sonar-config
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          if [ -z "$SONAR_TOKEN" ]; then
            echo "::notice title=Missing SONAR_TOKEN::Add repository secret SONAR_TOKEN from your SonarQube account token to enable SonarQube analysis."
            echo "configured=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -z "$SONAR_HOST_URL" ]; then
            echo "::notice title=Missing SONAR_HOST_URL::Add repository secret SONAR_HOST_URL, for example https://sonarcloud.io or your SonarQube server URL."
            echo "configured=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "configured=true" >> "$GITHUB_OUTPUT"

      - name: Analyze with SonarQube
        if: steps.sonar-config.outputs.configured == 'true'
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY || 'riansopian_mbc-app' }}
            -Dsonar.projectName=mbc-app
            -Dsonar.sources=src
            -Dsonar.tests=src
            -Dsonar.test.inclusions=**/*.test.ts,**/*.test.tsx
            -Dsonar.exclusions=**/*.test.ts,**/*.test.tsx,**/__tests__/**,coverage/**,.next/**,node_modules/**,public/**
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
